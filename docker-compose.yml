name: mini-library-stack

services:
  app:
    container_name: mini-library
    build:
      context: .
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/mini_library
      JWT_SECRET: dev-only-mini-library-auth-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin12345
    ports:
      - "4000:4000"
      - "5173:5173"
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    container_name: mini-library-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mini_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - mini_library_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini_library"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mini_library_pgdata:
